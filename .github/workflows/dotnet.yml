name: CyberAwarenessChatbot CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x   

    - name: Restore dependencies
      run: dotnet restore CyberAwarenessChatbot/CyberAwarenessChatbot.csproj

    - name: Build project
      run: dotnet build CyberAwarenessChatbot/CyberAwarenessChatbot.csproj --configuration Release --no-restore

    - name: Run tests (if any)
      run: dotnet test CyberAwarenessChatbot/CyberAwarenessChatbot.csproj --no-build --verbosity normal || echo "No tests found, skipping..."